# Публикация артефактов Yocto на TFTP/NFS и перезагрузка NanoPi для загрузки с сети.
# Раннер: cryptowallet-host (ws8), где лежат каталоги netboot и (после bitbake) deploy.
#
# Перед первым запуском на хосте:
#   - bitbake cryptowallet-image (или минимум ядро + rootfs для NFS)
#   - rootfs для NFS: распаковать rootfs.tar.gz в infra/nanopi/netboot/nfsroot/ ИЛИ указать свой путь
#
# Переменные репозитория (Settings -> Actions -> Variables) — при необходимости:
#   YOCTO_DEPLOY_DIR  — например .../build/tmp/deploy/images/nanopi-neo
#   NETBOOT_TFTP      — по умолчанию infra/nanopi/netboot/tftp в корне репозитория
#   NETBOOT_NFSROOT   — по умолчанию infra/nanopi/netboot/nfsroot
#
# Секреты (как в nanopi-app-ci):
#   NANPI_HOST, NANPI_USER, NANPI_SSH_KEY
#
# Сценарий: после job плата грузится с NFS (U-Boot bootargs), либо ты вручную задаёшь загрузку.

name: Yocto → Netboot → reboot NanoPi

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "reboot = перезагрузить плату после публикации; sync-only = только файлы"
        type: choice
        options:
          - reboot
          - sync-only
        default: reboot

jobs:
  publish-and-reboot:
    runs-on: cryptowallet-host
    env:
      # Задай в репозитории Variables, если bitbake не в ./build относительно checkout
      YOCTO_DEPLOY_DIR: ${{ vars.YOCTO_DEPLOY_DIR }}
      NETBOOT_TFTP: ${{ vars.NETBOOT_TFTP }}
      NETBOOT_NFSROOT: ${{ vars.NETBOOT_NFSROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths
        id: paths
        run: |
          REPO="${GITHUB_WORKSPACE}"
          DEPLOY="${YOCTO_DEPLOY_DIR:-${REPO}/build/tmp/deploy/images/nanopi-neo}"
          if [[ -z "${NETBOOT_TFTP:-}" ]]; then TFTP="${REPO}/infra/nanopi/netboot/tftp"; else TFTP="${NETBOOT_TFTP}"; fi
          if [[ -z "${NETBOOT_NFSROOT:-}" ]]; then NFS="${REPO}/infra/nanopi/netboot/nfsroot"; else NFS="${NETBOOT_NFSROOT}"; fi
          echo "deploy=${DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "tftp=${TFTP}" >> "$GITHUB_OUTPUT"
          echo "nfs=${NFS}" >> "$GITHUB_OUTPUT"
          test -d "${DEPLOY}" || (echo "Нет каталога deploy: ${DEPLOY} — собери Yocto или задай YOCTO_DEPLOY_DIR" && exit 1)
          test -d "${TFTP}" && test -d "${NFS}"

      - name: Publish kernel + dtb to TFTP
        run: |
          DEPLOY="${{ steps.paths.outputs.deploy }}"
          TFTP="${{ steps.paths.outputs.tftp }}"
          set -e
          for f in zImage uImage; do
            if [[ -f "${DEPLOY}/${f}" ]]; then cp -av "${DEPLOY}/${f}" "${TFTP}/"; break; fi
          done
          for dtb in sun8i-h3-nanopi-neo.dtb; do
            if [[ -f "${DEPLOY}/${dtb}" ]]; then cp -av "${DEPLOY}/${dtb}" "${TFTP}/"; fi
          done
          ls -la "${TFTP}"

      - name: Sync rootfs to NFS export (tar из deploy)
        run: |
          DEPLOY="${{ steps.paths.outputs.deploy }}"
          NFS="${{ steps.paths.outputs.nfs }}"
          sudo mkdir -p "${NFS}"
          shopt -s nullglob
          TARS=("${DEPLOY}"/*.rootfs.tar.gz "${DEPLOY}"/*image*.tar.bz2 "${DEPLOY}"/*rootfs*.tar.bz2)
          if [[ ${#TARS[@]} -eq 0 || ! -f "${TARS[0]}" ]]; then
            echo "Нет rootfs-архива в ${DEPLOY} — положи распакованный rootfs в ${NFS} вручную или собери образ с tar."
            exit 0
          fi
          echo "Используем ${TARS[0]}"
          sudo rm -rf "${NFS:?}/"*
          if [[ "${TARS[0]}" == *.gz ]]; then sudo tar -xzf "${TARS[0]}" -C "${NFS}"; else sudo tar -xjf "${TARS[0]}" -C "${NFS}"; fi
          sync

      - name: Setup SSH
        env:
          NANPI_SSH_KEY: ${{ secrets.NANPI_SSH_KEY }}
        run: |
          test -n "${NANPI_SSH_KEY}" || (echo "NANPI_SSH_KEY не задан" && exit 1)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$NANPI_SSH_KEY" > ~/.ssh/nanopi_ed25519
          chmod 600 ~/.ssh/nanopi_ed25519
          ssh-keyscan -H "${{ secrets.NANPI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Reboot NanoPi
        if: ${{ github.event.inputs.mode != 'sync-only' }}
        env:
          NANPI_HOST: ${{ secrets.NANPI_HOST }}
          NANPI_USER: ${{ secrets.NANPI_USER }}
        run: |
          ssh -i ~/.ssh/nanopi_ed25519 -o StrictHostKeyChecking=accept-new \
            "${NANPI_USER}@${NANPI_HOST}" "sync; reboot || sudo reboot"

      - name: Подсказка
        if: ${{ github.event.inputs.mode == 'sync-only' }}
        run: echo "Артефакты обновлены; перезагрузи NanoPi вручную или через U-Boot netboot."
