# Publish Yocto artifacts to TFTP/NFS and reboot the board for network boot.
# Runner: cryptowallet-host (ws8) with netboot dirs and (after bitbake) deploy output.
#
# Before first run on the host:
#   - bitbake cryptowallet-image or core-image-minimal (orange-pi-one)
#   - rootfs: the job unpacks a tar into NETBOOT_NFSROOT (default infra/nanopi/netboot/nfsroot)
#
# Repository variables (Settings -> Actions -> Variables) if needed:
#   YOCTO_DEPLOY_DIR  — e.g. /data/projects/poky/build/tmp/deploy/images/orange-pi-one
#   NETBOOT_TFTP      — default ${GITHUB_WORKSPACE}/infra/nanopi/netboot/tftp
#   NETBOOT_NFSROOT   — default ${GITHUB_WORKSPACE}/infra/nanopi/netboot/nfsroot
#
# Secrets (same as nanopi-app-ci):
#   NANPI_HOST, NANPI_USER, NANPI_SSH_KEY
#
# Flow: after the job the board boots from NFS (per U-Boot bootargs), or you boot manually.

name: Yocto → Netboot → reboot NanoPi

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "reboot = reboot board after publish; sync-only = files only"
        type: choice
        options:
          - reboot
          - sync-only
        default: reboot

jobs:
  publish-and-reboot:
    runs-on: cryptowallet-host
    env:
      # Set in repo Variables if bitbake output is not under ./build for this checkout
      YOCTO_DEPLOY_DIR: ${{ vars.YOCTO_DEPLOY_DIR }}
      NETBOOT_TFTP: ${{ vars.NETBOOT_TFTP }}
      NETBOOT_NFSROOT: ${{ vars.NETBOOT_NFSROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths
        id: paths
        run: |
          REPO="${GITHUB_WORKSPACE}"
          if [[ -n "${YOCTO_DEPLOY_DIR:-}" ]]; then
            DEPLOY="${YOCTO_DEPLOY_DIR}"
          elif [[ -d "/data/projects/poky/build/tmp/deploy/images/orange-pi-one" ]]; then
            DEPLOY="/data/projects/poky/build/tmp/deploy/images/orange-pi-one"
          else
            DEPLOY="${REPO}/build/tmp/deploy/images/orange-pi-one"
          fi
          if [[ -z "${NETBOOT_TFTP:-}" ]]; then TFTP="${REPO}/infra/nanopi/netboot/tftp"; else TFTP="${NETBOOT_TFTP}"; fi
          if [[ -z "${NETBOOT_NFSROOT:-}" ]]; then NFS="${REPO}/infra/nanopi/netboot/nfsroot"; else NFS="${NETBOOT_NFSROOT}"; fi
          echo "deploy=${DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "tftp=${TFTP}" >> "$GITHUB_OUTPUT"
          echo "nfs=${NFS}" >> "$GITHUB_OUTPUT"
          test -d "${DEPLOY}" || (echo "Deploy directory missing: ${DEPLOY} — run Yocto or set YOCTO_DEPLOY_DIR" && exit 1)
          test -d "${TFTP}" && test -d "${NFS}"

      - name: Publish kernel + dtb to TFTP
        run: |
          DEPLOY="${{ steps.paths.outputs.deploy }}"
          TFTP="${{ steps.paths.outputs.tftp }}"
          set -e
          for f in zImage uImage; do
            if [[ -f "${DEPLOY}/${f}" ]]; then cp -av "${DEPLOY}/${f}" "${TFTP}/"; break; fi
          done
          for dtb in sun8i-h3-orangepi-one.dtb sun8i-h3-nanopi-neo.dtb; do
            if [[ -f "${DEPLOY}/${dtb}" ]]; then cp -av "${DEPLOY}/${dtb}" "${TFTP}/"; fi
          done
          ls -la "${TFTP}"

      - name: Sync rootfs to NFS export (tar from deploy)
        run: |
          DEPLOY="${{ steps.paths.outputs.deploy }}"
          NFS="${{ steps.paths.outputs.nfs }}"
          sudo mkdir -p "${NFS}"
          shopt -s nullglob
          TARS=("${DEPLOY}"/*.rootfs.tar.gz "${DEPLOY}"/*image*.tar.bz2 "${DEPLOY}"/*rootfs*.tar.bz2)
          if [[ ${#TARS[@]} -eq 0 || ! -f "${TARS[0]}" ]]; then
            echo "No rootfs archive in ${DEPLOY} — unpack rootfs into ${NFS} manually or build an image that produces a tar."
            exit 0
          fi
          echo "Using ${TARS[0]}"
          sudo rm -rf "${NFS:?}/"*
          if [[ "${TARS[0]}" == *.gz ]]; then sudo tar -xzf "${TARS[0]}" -C "${NFS}"; else sudo tar -xjf "${TARS[0]}" -C "${NFS}"; fi
          sync

      - name: Setup SSH
        env:
          NANPI_SSH_KEY: ${{ secrets.NANPI_SSH_KEY }}
        run: |
          test -n "${NANPI_SSH_KEY}" || (echo "NANPI_SSH_KEY is not set" && exit 1)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$NANPI_SSH_KEY" > ~/.ssh/nanopi_ed25519
          chmod 600 ~/.ssh/nanopi_ed25519
          ssh-keyscan -H "${{ secrets.NANPI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Reboot NanoPi
        if: ${{ github.event.inputs.mode != 'sync-only' }}
        env:
          NANPI_HOST: ${{ secrets.NANPI_HOST }}
          NANPI_USER: ${{ secrets.NANPI_USER }}
        run: |
          ssh -i ~/.ssh/nanopi_ed25519 -o StrictHostKeyChecking=accept-new \
            "${NANPI_USER}@${NANPI_HOST}" "sync; reboot || sudo reboot"

      - name: Hint
        if: ${{ github.event.inputs.mode == 'sync-only' }}
        run: echo "Artifacts updated; reboot the board manually or via U-Boot netboot."
