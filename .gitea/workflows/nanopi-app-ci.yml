# CI/CD for app debugging on NanoPi NEO.
#
# Layout:
# - verify: quick checks (runner label ubuntu-latest, like simple-ci).
# - deploy-to-nanopi: copies artifact/script to the board over SSH (secrets in Gitea).
#
# Gitea from the board/LAN: http://192.168.126.3:3000/ (ws8 host IP, not macvlan 192.168.127.5).
# Secrets (Settings -> Secrets and variables -> Actions):
#   NANPI_HOST          — IP or hostname (e.g. 192.168.127.166)
#   NANPI_USER          — SSH user (e.g. root or pi)
#   NANPI_SSH_KEY       — private key (PEM), single-line or multiline
# Optional:
#   NANPI_DEPLOY_PATH   — directory on the board (default /opt/cryptowallet)
#
# Enable Actions in Gitea: Settings -> Repository -> Actions -> Enable Actions.
# Register act_runner on the build host and/or NanoPi (see infra/gitea/register-act-runner-nanopi.sh).

name: NanoPi App CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell sanity
        run: |
          bash -n scripts/bootstrap.sh || true
          test -f README.md

  deploy-to-nanopi:
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          NANPI_SSH_KEY: ${{ secrets.NANPI_SSH_KEY }}
        run: |
          test -n "${NANPI_SSH_KEY}" || (echo "Secret NANPI_SSH_KEY is not set" && exit 1)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$NANPI_SSH_KEY" > ~/.ssh/nanopi_ed25519
          chmod 600 ~/.ssh/nanopi_ed25519
          ssh-keyscan -H "${{ secrets.NANPI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy marker (replace with your build script or binary copy)
        env:
          NANPI_HOST: ${{ secrets.NANPI_HOST }}
          NANPI_USER: ${{ secrets.NANPI_USER }}
          DEPLOY_PATH: ${{ secrets.NANPI_DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/cryptowallet}"
          ssh -i ~/.ssh/nanopi_ed25519 -o StrictHostKeyChecking=accept-new \
            "${NANPI_USER}@${NANPI_HOST}" \
            "mkdir -p '${DEPLOY_PATH}' && echo 'deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) $(git rev-parse --short HEAD 2>/dev/null || echo unknown)' >> '${DEPLOY_PATH}/.deploy-log'"

      - name: Remote smoke (example)
        env:
          NANPI_HOST: ${{ secrets.NANPI_HOST }}
          NANPI_USER: ${{ secrets.NANPI_USER }}
        run: |
          ssh -i ~/.ssh/nanopi_ed25519 -o StrictHostKeyChecking=accept-new \
            "${NANPI_USER}@${NANPI_HOST}" "uname -a && uptime"
